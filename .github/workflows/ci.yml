name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  shell:
    name: Shell syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Check shell syntax
        run: |
          bash -n install.sh
          bash -n lib/utils.sh
          bash -n features/shell.sh
          bash -n features/git.sh
          bash -n features/claude-status.sh
          bash -n features/claude.sh
          bash -n shell/exports.sh
          bash -n shell/aliases.sh
          bash -n shell/functions.sh
          bash -n bashrc
          bash -n zshrc

  install:
    name: Install script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: scripts/claude-status/go.mod
          cache: false

      - name: Run install.sh
        run: bash install.sh

      - name: Verify shell feature — symlinks exist
        run: |
          test -L ~/.zshrc
          test -L ~/.bashrc

      - name: Verify git feature — symlinks exist
        run: |
          test -L ~/.gitconfig
          test -L ~/.gitignore_global

      - name: Verify claude-status feature — binary built
        run: test -x ~/.local/bin/claude-status

      - name: Verify claude-status feature — statusLine injected
        run: grep -q '"statusLine"' ~/.claude/settings.json

      - name: Verify claude feature — CLAUDE.md symlinked
        run: test -L ~/.claude/CLAUDE.md

      - name: Verify claude feature — commands symlinked
        run: |
          test -L ~/.claude/commands/standup.md
          test -L ~/.claude/commands/explain.md
          test -L ~/.claude/commands/pr.md

      - name: Verify install is idempotent
        run: bash install.sh

  feature-isolation:
    name: Feature isolation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Shell feature installs without git or Go
        run: bash features/shell.sh "$PWD"

      - name: Git feature skips when git is unavailable
        run: |
          PATH_BACKUP="$PATH"
          export PATH="$(echo "$PATH" | tr ':' '\n' | grep -v '/usr/bin$\|/bin$' | tr '\n' ':')"
          bash features/git.sh "$PWD" || true
          export PATH="$PATH_BACKUP"

      - name: Claude feature skips when python3 is unavailable
        run: |
          bash -c '
            require() { exit 0; }
            source lib/utils.sh
            # Verify it exits 0 even on missing deps
          '
          true

      - name: Each feature exits 0 regardless of environment
        run: |
          bash features/shell.sh      "$PWD" && echo "shell: OK"
          bash features/git.sh        "$PWD" && echo "git: OK"
          bash features/claude.sh     "$PWD" && echo "claude: OK"

  claude-status:
    name: claude-status build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: scripts/claude-status/go.mod
          cache: false

      - name: Build
        run: |
          mkdir -p ~/.local/bin
          cd scripts/claude-status && go build -o ~/.local/bin/claude-status .

      - name: Vet
        run: cd scripts/claude-status && go vet ./...

      - name: Smoke test — empty input exits 0
        run: echo '{}' | ~/.local/bin/claude-status

      - name: Smoke test — full payload produces model segment
        run: |
          echo '{
            "model": {"id": "claude-sonnet-4-6", "display_name": "Sonnet 4.6"},
            "session_id": "ci-test",
            "cost": {"total_cost_usd": 0.05, "total_duration_ms": 60000},
            "context_window": {
              "total_input_tokens": 10000,
              "context_window_size": 200000,
              "used_percentage": 5.0
            }
          }' | ~/.local/bin/claude-status | grep -q '⬡'
