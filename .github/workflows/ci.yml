name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual escape hatch: push/pull_request are scoped to main (Task 14 opens
  # the cutover PR), but feature-branch work still needs to validate CI green
  # before that PR exists.
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  claude-status:
    name: claude-status build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: scripts/claude-status/go.mod
          cache: false

      - name: Build
        run: |
          mkdir -p ~/.local/bin
          cd scripts/claude-status && go build -o ~/.local/bin/claude-status .

      - name: Check formatting
        run: |
          cd scripts/claude-status
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            echo "Run: gofmt -w scripts/claude-status/"
            exit 1
          fi

      - name: Vet
        run: cd scripts/claude-status && go vet ./...

      - name: Smoke test — empty input exits 0
        run: echo '{}' | ~/.local/bin/claude-status

      - name: Smoke test — full payload produces model segment
        run: |
          echo '{
            "model": {"id": "claude-sonnet-4-6", "display_name": "Sonnet 4.6"},
            "session_id": "ci-test",
            "cost": {"total_cost_usd": 0.05, "total_duration_ms": 60000},
            "context_window": {
              "total_input_tokens": 10000,
              "context_window_size": 200000,
              "used_percentage": 5.0
            }
          }' | ~/.local/bin/claude-status | grep -q '⬡'

  chezmoi:
    name: chezmoi verify + smoke
    runs-on: ubuntu-latest
    env:
      CHEZMOI_AGE_KEY: ${{ secrets.CHEZMOI_AGE_KEY }}
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: Template unit tests
        run: for t in tests/template/*.sh; do bash "$t"; done

      - name: Script unit tests
        run: for t in tests/scripts/*.sh; do bash "$t"; done

      - name: chezmoi doctor
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          chezmoi doctor --source . || true

      - name: chezmoi init + verify
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          # tests/lib.sh is the proven two-phase init harness: chezmoi's
          # `execute-template --init` skips .chezmoi.toml.tmpl's [data], and
          # --promptString keys on the prompt TEXT (here "machineRole", by
          # deliberate template design — see home/.chezmoi.toml.tmpl), not
          # the data path. Reuse chez_init rather than re-deriving this.
          # shellcheck disable=SC1091
          . tests/lib.sh
          cfg="$(chez_init ephemeral)"
          dest="$(mktemp -d)"
          # `chezmoi verify` reports drift against the *current* destination —
          # it never applies anything itself. Verifying a still-empty dest
          # would trivially fail (every managed file "differs" from nothing),
          # so apply once into the sandbox first; verify then confirms apply
          # and verify agree on the resulting state.
          chez_apply "$cfg" "$dest"
          # chez_verify re-renders under the same HOME override chez_apply
          # used — templates embedding .chezmoi.homeDir in file content
          # would otherwise drift against the sandbox (see tests/lib.sh).
          chez_verify "$cfg" "$dest"

      - name: Smoke test — chezmoi apply into temp HOME
        # CHEZMOI_AGE_KEY is already the real secret from the job env (not a
        # dummy): tests/smoke.sh's chez_apply does a real full apply that
        # decrypts encrypted_ source files, and a bad key would abort the
        # whole apply on first decrypt failure.
        run: bash tests/smoke.sh
