# ============================================================
# Prefix: Ctrl+A  (easier to reach than default Ctrl+B)
# ============================================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ============================================================
# Terminal
# ============================================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # 24-bit true colour
set -s escape-time 0                         # no Escape key delay
set -g focus-events on                       # vim/neovim integration

# ============================================================
# Indexing
# ============================================================
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on   # close a window → gap fills in

# ============================================================
# Mouse
# ============================================================
set -g mouse on

# ============================================================
# Scrollback
# ============================================================
set -g history-limit 50000

# ============================================================
# Splits  (| = vertical bar, - = horizontal line)
# ============================================================
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window keeps current directory
bind c new-window -c "#{pane_current_path}"

# ============================================================
# Pane navigation  (Alt+Arrow — no prefix needed)
# ============================================================
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Window navigation  (Ctrl+Shift+Arrow — no prefix needed)
bind -n C-S-Left  previous-window
bind -n C-S-Right next-window

# ============================================================
# Pane resize  (Prefix + H/J/K/L, repeatable)
# ============================================================
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================================
# Copy mode  (vi keys)
# ============================================================
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ============================================================
# Reload config
# ============================================================
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ============================================================
# Status bar
# ============================================================
set -g status-position bottom
set -g status-interval 5
set -g status-style          "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left           "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e] "
set -g status-right          "#[fg=#6c7086] %H:%M  %d %b "
set -g status-left-length 20
set -g status-right-length 40

set -g window-status-format         " #I:#W "
set -g window-status-current-format "#[bg=#313244,fg=#89b4fa,bold] #I:#W "
set -g window-status-separator      ""

set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style            "bg=#1e1e2e,fg=#cdd6f4"
